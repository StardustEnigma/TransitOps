# ========================
# Application
# ========================
spring.application.name=TransitOps_backend

# ========================
# PostgreSQL DataSource
# ========================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/transitops}
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ========================
# JPA / Hibernate
# ========================
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ========================
# Server
# ========================
server.port=8080

# ========================
# JWT Configuration
# ========================
jwt.secret=5a6e7f8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2c3d4e5f6a
jwt.expiration-ms=86400000
