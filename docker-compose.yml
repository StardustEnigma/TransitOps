services:
  # ========================
  # PostgreSQL Database
  # ========================
  postgres:
    image: postgres:17-alpine
    container_name: transitops-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: transitops
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d transitops"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========================
  # pgAdmin (DB GUI)
  # ========================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: transitops-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@transitops.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_LISTEN_PORT: 5050
    ports:
      - "5050:5050"
    depends_on:
      postgres:
        condition: service_healthy

  # ========================
  # Spring Boot Backend
  # ========================
  backend:
    build: ./TransitOps_backend
    container_name: transitops-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/transitops
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
